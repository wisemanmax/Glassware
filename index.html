<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>SLIME BY — Saving the World from Corporate America</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Archivo:wght@400;600;800&display=swap"
      rel="stylesheet"
    />
    <!-- Relative path so it works whether served from the domain root or a
         project sub-path (e.g. /Glassware/). -->
    <link rel="stylesheet" href="./src/game/style.css" />

    <!-- Import map: lets the browser resolve the bare `three` specifiers from a
         CDN with NO build step, so the raw repo runs directly on GitHub Pages.
         (Vite still bundles `three` from node_modules in dev/build; this map is
         simply ignored there.) -->
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.184.0/build/three.module.js",
          "three/examples/jsm/": "https://cdn.jsdelivr.net/npm/three@0.184.0/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <div id="game-root">
      <canvas id="gl"></canvas>
      <div id="ui"></div>
      <div id="fx"></div>
      <div id="touch"></div>
      <div id="boot">
        <div class="boot-logo">SLIME&nbsp;BY</div>
        <div class="boot-sub">Saving the world from corporate America</div>
        <button id="boot-start">START</button>
        <button id="boot-continue" hidden>CONTINUE</button>
        <div class="boot-hint">WASD / arrows to move · E or Space to interact · click menu buttons</div>
      </div>
    </div>
    <script type="module" src="./src/game/main.js"></script>
  </body>
</html>
